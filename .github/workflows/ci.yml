name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Typecheck, Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npx turbo run typecheck --ui=stream

      - name: Lint
        run: npx turbo run lint --ui=stream

      - name: Build
        run: npx turbo run build --ui=stream
        env:
          NEXT_TELEMETRY_DISABLED: 1
          DRIZZLE_TELEMETRY_DISABLED: 1

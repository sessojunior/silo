services:
  api:
    image: ${SILO_API_IMAGE:?SILO_API_IMAGE nao definido}
    container_name: ${SILO_API_CONTAINER:-silo-api}
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      DATABASE_URL_PROD: ${DATABASE_URL_PROD:?DATABASE_URL_PROD nao definido}
      DATABASE_URL: ${DATABASE_URL_PROD:?DATABASE_URL_PROD nao definido}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET nao definido}
      APP_URL_DEV: ${APP_URL_DEV}
      APP_URL_PROD: ${APP_URL_PROD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      KAFKA_REST_PROXY_URL: ${KAFKA_REST_PROXY_URL}
      KAFKA_REST_PROXY_AUTH: ${KAFKA_REST_PROXY_AUTH}
      PRODUCT_FLOW_API_KEY: ${PRODUCT_FLOW_API_KEY}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b-instruct-q4_K_M}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-30000}
      OLLAMA_MAX_CONCURRENT_REQUESTS: ${OLLAMA_MAX_CONCURRENT_REQUESTS:-1}
      TZ: America/Sao_Paulo
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped

  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.30.0-rc7}
    container_name: ${OLLAMA_CONTAINER:-silo-ollama}
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b-instruct-q4_K_M}
    command: ["ollama", "serve"]
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  ollama-init:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.30.0-rc7}
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b-instruct-q4_K_M}
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["sh", "-lc"]
    command: ["until ollama list >/dev/null 2>&1; do sleep 1; done; ollama pull \"$$OLLAMA_MODEL\""]
    restart: "no"

  worker:
    image: ${SILO_WORKER_IMAGE:?SILO_WORKER_IMAGE nao definido}
    container_name: ${SILO_WORKER_CONTAINER:-silo-worker}
    environment:
      NODE_ENV: production
      DATABASE_URL_PROD: ${DATABASE_URL_PROD:?DATABASE_URL_PROD nao definido}
      KAFKA_REST_PROXY_URL: ${KAFKA_REST_PROXY_URL}
      KAFKA_REST_PROXY_AUTH: ${KAFKA_REST_PROXY_AUTH}
      KAFKA_TOPICS: ${KAFKA_TOPICS}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-silo-worker}
      KAFKA_DLQ_PREFIX: ${KAFKA_DLQ_PREFIX:-dlq}
      TZ: America/Sao_Paulo
    depends_on:
      - api
    restart: unless-stopped

  web:
    image: ${SILO_WEB_IMAGE:?SILO_WEB_IMAGE nao definido}
    container_name: ${SILO_WEB_CONTAINER:-silo-web}
    ports:
      - "${SILO_PORT:-8084}:3000"
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
      APP_URL_DEV: ${APP_URL_DEV}
      APP_URL_PROD: ${APP_URL_PROD}
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET nao definido}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      TZ: America/Sao_Paulo
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - frontend
      - default

volumes:
  uploads_data:
  ollama_data:

networks:
  frontend:
    driver: bridge

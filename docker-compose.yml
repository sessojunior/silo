services:
  db:
    image: ${SILO_POSTGRES_IMAGE:-pgvector/pgvector:pg17}
    container_name: silo-db
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-silo}
      POSTGRES_USER: ${POSTGRES_USER:-silo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-silo}
    volumes:
      - silo-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: silo-api
    container_name: silo-api
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL_PROD: ${DATABASE_URL_PROD}
      DATABASE_URL: ${DATABASE_URL_PROD}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      APP_URL_DEV: ${APP_URL_DEV:-http://localhost}
      APP_URL_PROD: ${APP_URL_PROD:-http://localhost}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      KAFKA_REST_PROXY_URL: ${KAFKA_REST_PROXY_URL}
      KAFKA_REST_PROXY_AUTH: ${KAFKA_REST_PROXY_AUTH}
      PRODUCT_FLOW_API_KEY: ${PRODUCT_FLOW_API_KEY}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b-instruct-q4_K_M}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text:v1.5}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-30000}
      OLLAMA_MAX_CONCURRENT_REQUESTS: ${OLLAMA_MAX_CONCURRENT_REQUESTS:-1}
      TZ: America/Sao_Paulo
    volumes:
      - silo-storage-data:/app/uploads
    depends_on:
      db:
        condition: service_started
      ollama:
        condition: service_started
    restart: unless-stopped

  ollama:
    image: ${SILO_OLLAMA_IMAGE:-ollama/ollama:0.30.0-rc7}
    container_name: silo-ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b-instruct-q4_K_M}
    command: ["serve"]
    volumes:
      - silo-ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    image: silo-worker
    container_name: silo-worker
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL_PROD: ${DATABASE_URL_PROD}
      KAFKA_REST_PROXY_URL: ${KAFKA_REST_PROXY_URL}
      KAFKA_REST_PROXY_AUTH: ${KAFKA_REST_PROXY_AUTH}
      KAFKA_TOPICS: ${KAFKA_TOPICS}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-silo-worker}
      KAFKA_DLQ_PREFIX: ${KAFKA_DLQ_PREFIX:-dlq}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b-instruct-q4_K_M}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-30000}
      TZ: America/Sao_Paulo
    depends_on:
      - api
      - db
      - ollama
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: silo-web
    container_name: silo-web
    ports:
      - "${SILO_HOST_PORT:-80}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      API_URL: http://api:4000
      APP_URL_DEV: ${APP_URL_DEV:-http://localhost}
      APP_URL_PROD: ${APP_URL_PROD:-http://localhost}
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
      TZ: America/Sao_Paulo
    volumes:
      - silo-storage-data:/app/uploads
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - frontend
      - default

volumes:
  silo-postgres-data:
    name: silo-postgres-data
  silo-storage-data:
    name: silo-storage-data
  silo-ollama-data:
    name: silo-ollama-data

networks:
  frontend:
    driver: bridge

